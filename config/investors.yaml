# Known investment vehicles / family accounts -> canonical investor name.
# The matcher treats each alias as an extra name pattern but reports the
# canonical investor, so entity-routed buys aggregate under one person.
# Matching is the same token-subset rule; aliases apply to NEWLY ingested
# deals only (historical rows keep the flag computed at ingest time).
# NOTE: skip ambiguous personal names (e.g. "Rajiv Khanna" for Dolly Khanna) —
# too common, would false-positive.
aliases:
  Kedia Securities: Vijay Kedia                # his investment vehicle
  Param Capital: Mukul Agrawal                 # his firm
  Bengal Finance & Investment: Ashish Kacholia # his investment vehicle
  MK Ventures: Madhusudan Kela                 # his firm
  Madhuri Kela: Madhusudan Kela                # spouse account, frequent co-buyer
  Abakkus Asset Manager: Sunil Singhania       # explicit long-form of Abakkus
