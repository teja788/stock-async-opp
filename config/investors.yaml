# Marquee long-horizon Indian investors to FLAG (not endorse) when their name appears
# in the client-name field of publicly-disclosed bulk/block deals or insider/SAST filings.
# Matching is case-insensitive substring against the disclosed client name. Edit freely.

rule: flag_any_disclosed_purchase   # every disclosed purchase is still FLAGGED (stored +
                                    # shown in INVESTOR/DEALS); `significance` below only
                                    # gates the aggregated 90d ACCUMULATION section.

# Hybrid significance gate for the INSIDER ACCUMULATION section (decided 2026-07-03):
# a company's 90d aggregate must clear BOTH the absolute floor AND the %-of-mcap
# ratio to be listed as significant. A SAST 5% crossing always qualifies.
# Sub-threshold names collapse into a single count line (nothing vanishes silently).
significance:
  floor_cr: 1.0          # 90d aggregate buy value must be >= ₹1 cr (kills token buys)
  min_pct_mcap: 0.25     # ...AND >= 0.25% of market cap (materiality-to-size)
  # A CLUSTER (>=3 distinct insiders buying) that clears the ₹ floor also
  # qualifies with the % ratio waived — many different buyers is its own signal.

# Also flag (handled in code, not listed here): promoter buying, and any single
# disclosed bulk/block PURCHASE regardless of name.

