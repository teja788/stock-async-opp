# stock-async-opp — global settings (edit me freely)
universe: nifty500
# Expand the scan universe beyond the index to liquid BSE companies above a
# market-cap floor (deduped against the index by ISIN). Set enabled: false to
# scan only the Nifty 500. Current setting ≈ 980 companies (~16 min full BSE scan).
universe_expansion:
  enabled: true
  mcap_floor_cr: 250           # base ₹-crore floor. The ₹250-3,000 cr smallcap band is
                               # the asymmetric sweet spot: one order/approval is
                               # needle-moving, and coverage is thin.
  groups: [A, B]               # BSE groups included at the floor. T (trade-to-trade
                               # surveillance), Z (compliance defaulters), X/XT (BSE-only
                               # illiquid) and M/MT (SME) stay deliberately excluded.
  group_caps: {}               # extra groups included only above a higher ₹cr cap

lookback_hours: 24                 # DEFAULT rolling window. Override per-run with
                                  # CLI flags --hours N / --days N on
                                  # scan / refresh / ask / digest (they combine).
market_cap_floor_cr: null          # optional ₹-crore floor to cut microcap noise (null = off)
request_delay_sec: 1.0             # polite delay between HTTP calls (~1 req/sec, per session)
max_retries: 3
bse_fetch_workers: 6               # parallel threads for the BSE filings pull.
                                  # 1 = fully polite/sequential (~16 min for ~980 names);
                                  # 6 ≈ ~3 min (each worker still throttled). Higher =
                                  # faster but more aggressive toward BSE.
timezone: Asia/Kolkata             # all stored/displayed times are IST

output:
  digest_dir: digests
  context_pack: runtime/context_pack.md

scoring:
  mode: agent                      # "agent" (live, default) | "llm_api" (future, see scoring/llm_scorer.py)

# Optional enrichment layer (degrades gracefully if its deps are absent).
pdf_extract:
  enabled: true                    # pull PDF body text for catalyst-tagged filings; uses pymupdf if present, else pypdf.
  max_per_scan: 40                 # NEW PDF fetches per scan (cached ones are free);
                                   # backlogs drain across scans automatically.

# Daily close + volume from the free BSE bhavcopy (one CSV per trading day).
# Powers the "already priced in?" line on pack items and the `review` command.
prices:
  enabled: true
  lookback_days: 90                # backfill / keep this many calendar days of closes
  prune_after_days: 200            # delete rows older than this to bound DB size
