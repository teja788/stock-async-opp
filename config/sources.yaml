# News RSS feeds + exchange endpoints.
# IMPORTANT: each feed URL is VERIFIED LIVE during Milestone 4 (fetched + confirmed valid XML).
# Any feed that does not resolve will be commented out with a note so you can fix it.
# Until Milestone 4 runs, treat these as CANDIDATES, not confirmed-working.

news_feeds:
  # name:  human label used in output
  # url:   RSS/Atom feed URL
  # trust: relative trust tag (reputed_news for all mainstream outlets)
  #
  # All feeds below were live-verified on 2026-06-05 (fetched, parsed, fresh
  # entries with parseable dates). Dead feeds are commented out with the reason.

  - name: Economic Times (Markets)
    url: https://economictimes.indiatimes.com/markets/rssfeeds/1977021501.cms
    trust: reputed_news
  - name: Economic Times (Stocks)
    url: https://economictimes.indiatimes.com/markets/stocks/rssfeeds/2146842.cms
    trust: reputed_news
  - name: LiveMint (Markets)
    url: https://www.livemint.com/rss/markets
    trust: reputed_news
  - name: The Hindu BusinessLine (Markets)
    url: https://www.thehindubusinessline.com/markets/feeder/default.rss
    trust: reputed_news
  - name: Business Today (Markets)
    url: https://www.businesstoday.in/rssfeeds/?id=225346
    trust: reputed_news
  - name: NDTV Profit
    url: https://feeds.feedburner.com/ndtvprofit-latest
    trust: reputed_news

  # --- DEAD / UNUSABLE (verified 2026-06-05) — fix the URL or remove ---
