# BSE public endpoints. Params are VERIFIED LIVE during Milestone 3 (headers/cookies may be needed).
bse:
  # Corporate announcements API (returns JSON). Confirmed param shape during Milestone 3.
  announcements_api: https://api.bseindia.com/BseIndiaAPI/api/AnnSubCategoryGetData/w
  # Securities ("List of Scrips") master — used for ISIN -> scrip_code mapping in Milestone 2.
  scrip_master: https://api.bseindia.com/BseIndiaAPI/api/ListofScripData/w

  # Deals + insider/SAST endpoints (verified live 2026-06-05 via the real site XHR).
  # NOTE the differing date formats per endpoint (see ingest_deals.py).
  bulk_block_deals: https://api.bseindia.com/BseIndiaAPI/api/BulkDealData_ng/w   # DealType=1 bulk, =2 block; FDate/TDate = DD/MM/YYYY
  block_deals_live: https://api.bseindia.com/BseIndiaAPI/api/BlockDeal_Beta/w    # fallback: latest trading day only, ignores params
  insider_sast: https://api.bseindia.com/BseIndiaAPI/api/getCorp_Regulation_ng/w # fromDT/ToDate = YYYYMMDD; Isdefault=0 with range

  # Source/citation pages for deals (per-dataset landing pages).
  bulk_deals_page: https://www.bseindia.com/markets/equity/EQReports/bulk_deals.aspx
  block_deals_page: https://www.bseindia.com/markets/equity/EQReports/block_deals.aspx
  insider_page: https://www.bseindia.com/corporates/Insider_Trading_new.aspx

  # Referer/Origin headers BSE expects (set in scanner/http.py).
  referer: https://www.bseindia.com/
  origin: https://www.bseindia.com

# NSE / NiftyIndices source for the Nifty 500 constituent list (verified in Milestone 2).
nse:
  nifty500_csv: https://niftyindices.com/IndexConstituent/ind_nifty500list.csv
  # Bulk/block deals snapshot (verified live 2026-06-05). Returns current/recent
  # BULK_DEALS_DATA + BLOCK_DEALS_DATA. The historical date-range endpoint is
  # bot-blocked (503), so this snapshot is current-day(s) only — fine for a daily run.
  largedeals: https://www.nseindia.com/api/snapshot-capital-market-largedeal
  deals_referer: https://www.nseindia.com/report-detail/display-bulk-and-block-deals
  root: https://www.nseindia.com/
